<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Plus Tiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;
  --bg2:#0d0f1a;
  --bg3:#121626;
  --bg4:#181d32;
  --bg5:#1f263f;
  --border:rgba(120,80,255,.1);
  --border2:rgba(120,80,255,.22);
  --text:#d4d8f0;
  --text2:#7a80a8;
  --text3:#3a4060;
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --purple3:#6d28d9;
  --purple-glow:rgba(139,92,246,.3);
  --purple-dim:rgba(139,92,246,.12);
  --green:#34d399;
  --radius:10px;
  --radius-sm:7px;
  /* Purple rank shades */
  --rank1:#c4b5fd;
  --rank2:#a78bfa;
  --rank3:#8b5cf6;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:'';
  position:fixed;top:0;left:50%;
  transform:translateX(-50%);
  width:1000px;height:600px;
  background:radial-gradient(ellipse at 50% 0%, rgba(139,92,246,.09) 0%, transparent 65%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);
  pointer-events:none;z-index:0;
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--purple)}
a{text-decoration:none;color:inherit}
button{border:none;background:none;cursor:pointer;font-family:inherit}

/* ══════════════════ HEADER ══════════════════ */
.site-header{
  position:sticky;top:0;z-index:200;
  height:68px;
  background:rgba(7,8,15,.97);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.header-inner{
  display:flex;align-items:center;gap:0;
  height:100%;max-width:1440px;margin:0 auto;padding:0 32px;
}
.logo{display:flex;flex-direction:column;margin-right:32px;flex-shrink:0}
.logo-text{
  font-family:'Orbitron',sans-serif;
  font-size:1.55rem;font-weight:900;letter-spacing:.04em;line-height:1;
  text-transform:uppercase;
}
.logo-mc{color:var(--purple)}
.logo-tiers{color:var(--purple2)}
.logo-sub{font-size:.55rem;font-weight:700;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-top:2px;font-family:'Orbitron',sans-serif}

.top-nav{display:flex;align-items:center;gap:4px;flex:1}
.nav-link{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:var(--radius-sm);
  font-weight:700;font-size:.78rem;color:var(--text2);
  letter-spacing:.05em;text-transform:uppercase;
  font-family:'Orbitron',sans-serif;
  transition:color .15s,background .15s;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-link.active{color:var(--purple2)}
.nav-discord{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:var(--radius-sm);
  font-weight:700;font-size:.78rem;color:var(--text2);
  letter-spacing:.05em;text-transform:uppercase;
  font-family:'Orbitron',sans-serif;
  transition:color .15s,background .15s;cursor:pointer;
}
.nav-discord:hover{color:var(--text);background:rgba(255,255,255,.04)}

.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-wrap{position:relative}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:8px 14px;
  width:230px;transition:border-color .2s,box-shadow .2s;
}
.search-inner:focus-within{
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(139,92,246,.15);
}
.search-inner svg{opacity:.35;flex-shrink:0}
.search-box{background:none;border:none;outline:none;color:var(--text);font-size:.82rem;font-family:'Orbitron',sans-serif;letter-spacing:.04em;width:100%}
.search-box::placeholder{color:var(--text3)}
.search-results{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius);overflow:hidden;z-index:300;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}
.sr-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .12s}
.sr-item:hover{background:var(--bg4)}
.sr-item img,.sr-avatar{width:32px;height:32px;border-radius:5px;object-fit:contain;image-rendering:pixelated;background:var(--bg5);flex-shrink:0;border:1px solid var(--border)}
.sr-avatar{display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#fff}
.sr-name{font-weight:900;font-size:.88rem;text-transform:uppercase;letter-spacing:.03em}
.sr-sub{font-size:.7rem;color:var(--text2);font-family:monospace;margin-top:1px}
.sr-region{margin-left:auto;font-size:.68rem;color:var(--text3);font-weight:700;letter-spacing:1px}
.hidden{display:none!important}

/* ══════════════════ MODE TABS ══════════════════ */
.mode-bar-wrap{
  position:sticky;top:68px;z-index:190;
  background:rgba(7,8,15,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  overflow:visible;
}
.mode-bar-inner{
  display:flex;align-items:stretch;
  max-width:1440px;margin:0 auto;padding:0 32px;
  overflow-x:auto;overflow-y:visible;scrollbar-width:none;
  gap:2px;
}
.mode-bar-inner::-webkit-scrollbar{display:none}

.mode-tab{
  display:flex;align-items:center;gap:8px;
  padding:10px 18px;
  color:var(--text3);font-weight:700;font-size:.72rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;
  font-family:'Orbitron',sans-serif;
  border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s,background .15s;
  flex-shrink:0;white-space:nowrap;
}
.mode-tab:hover{color:var(--text2);background:rgba(255,255,255,.02)}
.mode-tab.active{color:var(--purple2);border-bottom-color:var(--purple)}
.mode-tab img{width:16px;height:16px;object-fit:contain;image-rendering:pixelated;opacity:.4;transition:opacity .15s;flex-shrink:0}
.mode-tab.active img,.mode-tab:hover img{opacity:1}
.mode-tab .tab-emoji{font-size:1rem;opacity:.4;transition:opacity .15s}
.mode-tab.active .tab-emoji,.mode-tab:hover .tab-emoji{opacity:1}

.tab-divider{
  width:1px;background:var(--border);margin:8px 4px;flex-shrink:0;align-self:stretch;
}
.tab-section-label{
  display:flex;align-items:center;
  padding:0 10px;
  font-size:.55rem;font-weight:700;letter-spacing:.2em;color:var(--text3);
  text-transform:uppercase;font-family:'Orbitron',sans-serif;
  flex-shrink:0;white-space:nowrap;
}

.tab-bar-right{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px;flex-shrink:0}

/* ══════════════════ OTHER MODES DROPDOWN ══════════════════ */
.other-modes-wrap{
  position:relative;flex-shrink:0;
  display:flex;align-items:stretch;
}
.other-modes-btn{
  display:flex;align-items:center;gap:7px;
  padding:10px 16px;
  color:var(--text3);font-weight:700;font-size:.72rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;
  font-family:'Orbitron',sans-serif;
  border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s,background .15s;
  white-space:nowrap;user-select:none;
}
.other-modes-btn:hover{color:var(--text2);background:rgba(255,255,255,.02)}
.other-modes-btn.active{color:var(--purple2);border-bottom-color:var(--purple)}
.other-modes-btn.open{color:var(--purple2);background:rgba(139,92,246,.08);border-bottom-color:var(--purple)}
.other-modes-chevron{
  transition:transform .2s ease;
  opacity:.5;
}
.other-modes-btn.open .other-modes-chevron{transform:rotate(180deg);opacity:1}

.other-modes-dropdown{
  position:absolute;
  min-width:220px;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-top:2px solid var(--purple);
  border-radius:0 0 var(--radius) var(--radius);
  box-shadow:0 16px 48px rgba(0,0,0,.85),0 0 24px rgba(139,92,246,.12);
  z-index:9999;
  overflow:hidden;
  opacity:0;pointer-events:none;
  transform:translateY(-4px);
  transition:opacity .15s ease,transform .15s ease;
}
.other-modes-dropdown.open{
  opacity:1;pointer-events:all;
  transform:translateY(0);
}
.other-modes-dropdown-header{
  padding:8px 14px 6px;
  font-size:.55rem;font-weight:700;letter-spacing:.2em;
  text-transform:uppercase;color:var(--text3);
  font-family:'Orbitron',sans-serif;
  border-bottom:1px solid var(--border);
}
.other-mode-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  transition:background .12s,padding-left .15s;
  border-bottom:1px solid var(--border);
}
.other-mode-item:last-child{border-bottom:none}
.other-mode-item:hover{background:var(--purple-dim);padding-left:20px}
.other-mode-item.active{
  background:rgba(139,92,246,.12);
  border-left:2px solid var(--purple);
  padding-left:12px;
}
.other-mode-item img{
  width:18px;height:18px;object-fit:contain;
  image-rendering:pixelated;opacity:.7;flex-shrink:0;
}
.other-mode-item-label{
  font-family:'Orbitron',sans-serif;
  font-size:.72rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--text2);
}
.other-mode-item:hover .other-mode-item-label,
.other-mode-item.active .other-mode-item-label{color:var(--purple2)}
.info-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border-radius:var(--radius-sm);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-weight:700;font-size:.68rem;
  cursor:pointer;transition:all .13s;white-space:nowrap;
  letter-spacing:.06em;text-transform:uppercase;
  font-family:'Orbitron',sans-serif;
}
.info-btn:hover{border-color:var(--purple);color:var(--purple2);background:var(--bg4);box-shadow:0 0 14px var(--purple-dim)}

/* ══════════════════ SUB BAR ══════════════════ */
.sub-bar{background:var(--bg);border-bottom:1px solid var(--border)}
.sub-bar-inner{display:flex;align-items:center;max-width:1440px;margin:0 auto;padding:6px 32px}
.player-count-badge{
  margin-left:auto;font-size:.7rem;font-weight:700;color:var(--text3);
  font-family:'Orbitron',sans-serif;letter-spacing:.08em;
}

/* ══════════════════ MAIN ══════════════════ */
.main{max-width:1440px;margin:0 auto;padding:28px 32px 80px;position:relative;z-index:1}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:300px;color:var(--text2);font-weight:700}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════ OVERALL PLAYER CARDS ══════════════════ */
.player-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:14px 20px;
  display:flex;align-items:center;gap:14px;
  margin-bottom:8px;cursor:pointer;
  transition:all .25s cubic-bezier(.175,.885,.32,1.275);
  position:relative;overflow:visible;
}
.player-card::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;border-radius:3px;background:var(--border);
  transition:background .2s;
}
.player-card:hover::before{background:var(--purple)}
.player-card:hover{
  border-color:var(--border2);background:var(--bg3);
  transform:translateX(5px);
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px var(--purple-dim);
}

.head-float-wrap{
  position:relative;flex-shrink:0;
  width:46px;height:46px;
}
.player-head-sm{
  width:46px;height:46px;border-radius:8px;
  object-fit:contain;image-rendering:pixelated;
  border:1px solid var(--border);
  background:var(--bg4);
  display:block;
  transition:opacity .2s,transform .2s;
}
.head-float{
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%) scale(1) translateY(0) rotate(0deg);
  transform-origin:bottom center;
  width:72px;height:72px;
  border-radius:10px;
  object-fit:contain;image-rendering:pixelated;
  border:2px solid var(--purple);
  background:var(--bg4);
  opacity:0;pointer-events:none;
  z-index:30;
  transition:
    transform .4s cubic-bezier(.34,1.7,.64,1),
    opacity .18s ease,
    box-shadow .3s ease;
  box-shadow:none;
}
.player-card:hover .head-float{
  opacity:1;
  transform:translateX(-50%) scale(1.1) translateY(-18px) rotate(-4deg);
  box-shadow:0 8px 24px rgba(0,0,0,.8),0 0 18px var(--purple-glow);
}
.player-card:hover .player-head-sm{
  opacity:0.4;
  transform:scale(0.95);
}

/* Purple rank shades — no gold/silver/bronze/red */
.card-rank{
  font-family:'Orbitron',sans-serif;
  font-size:1.05rem;font-weight:900;
  color:var(--text3);width:30px;text-align:center;flex-shrink:0;
}
.rank-1{color:var(--rank1)!important}
.rank-2{color:var(--rank2)!important}
.rank-3{color:var(--rank3)!important}

.card-info{flex:1;min-width:0}
.card-ign{
  font-weight:900;font-style:italic;
  font-size:1.15rem;text-transform:uppercase;
  letter-spacing:.5px;color:#fff;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:block;
}
.card-sub{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.card-title{font-size:.72rem;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.card-pts{font-size:.72rem;font-weight:700;color:var(--text2);letter-spacing:.5px}
.region-badge{
  font-size:.6rem;font-weight:900;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text2);
  background:var(--bg);border:1px solid var(--border);
  padding:2px 7px;border-radius:4px;
}

/* Overall card tier badges — purple themed */
.card-tiers{display:flex;gap:6px;flex-shrink:0;margin-left:auto;align-items:center;flex-wrap:wrap;max-width:220px;justify-content:flex-end}
.tier-badge-sm{
  font-size:.65rem;font-weight:900;letter-spacing:.5px;
  padding:3px 8px;border-radius:5px;
  display:inline-flex;align-items:center;gap:4px;
  /* purple forced — color/border set inline but background always purple-tinted */
  background:rgba(139,92,246,.1)!important;
  border:1px solid rgba(139,92,246,.3)!important;
  color:var(--purple2)!important;
}
.tier-badge-sm img{
  width:12px;height:12px;
  image-rendering:pixelated;
  object-fit:contain;
  opacity:.9;
  flex-shrink:0;
}

/* ══════════════════ TIER COLUMNS VIEW ══════════════════ */
.tier-columns{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(185px,1fr));
  gap:12px;align-items:start;
}
.tier-col{
  background:var(--bg2);border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);
  animation:fadeUp .3s ease both;
  transition:border-color .2s;
}
.tier-col:hover{border-color:var(--border2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tier-col-header{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 14px;position:relative;overflow:hidden;
}
.tier-col-header::before{content:'';position:absolute;inset:0;background:currentColor;opacity:.08}
.tier-col-name{
  font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:900;
  letter-spacing:.04em;position:relative;z-index:1;text-transform:uppercase;
}
.tier-col-trophy{font-size:.9rem;position:relative;z-index:1;line-height:1}
.tier-player-row{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-top:1px solid var(--border);
  cursor:pointer;transition:background .12s,padding-left .12s;
}
.tier-player-row:hover{background:var(--purple-dim);padding-left:16px}
.tier-player-row img,.tier-player-fb{
  width:26px;height:26px;border-radius:4px;
  object-fit:contain;image-rendering:pixelated;background:var(--bg5);flex-shrink:0;
}
.tier-player-fb{display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.7rem;color:#fff}
.tier-player-name{font-weight:700;font-size:.85rem;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;font-style:italic}
.tier-col-empty{padding:12px;color:var(--text3);font-size:.75rem;text-align:center;border-top:1px solid var(--border);font-style:italic}

/* ══════════════════ TITLE ANIMATIONS ══════════════════ */
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes flowText{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes nameShimmer{0%{background-position:200% center}100%{background-position:-200% center}}

/* ALL title colors — full purple palette */
.title-grandmaster{background:linear-gradient(90deg,#c4b5fd,#ede9fe,#a78bfa,#ede9fe,#c4b5fd);background-size:200% auto;animation:shimmer 3s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-master{color:#c4b5fd}
.title-ace{color:#a78bfa}
.title-specialist{color:var(--purple2)}
.title-cadet{color:#818cf8}
/* FIX 1: Combat Novice was green — now purple */
.title-novice{color:#9d7df0}
.title-rookie{color:var(--text2)}

.animate-flow{display:inline-block}

/* ══════════════════ PLAYER MODAL ══════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  backdrop-filter:blur(16px);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .18s ease;
  overflow-y:auto;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:20px;width:100%;max-width:340px;
  position:relative;overflow:hidden;
  animation:slideUp .28s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 40px var(--purple-glow);
}
.modal-box::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--purple2),var(--purple),var(--purple2),transparent);
  background-size:200% 100%;animation:shimmer 3s linear infinite;
  border-radius:20px 20px 0 0;pointer-events:none;z-index:2;
}
@keyframes slideUp{
  0%{opacity:0;transform:scale(.85) translateY(20px)}
  60%{opacity:1;transform:scale(1.03) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

.modal-close{
  position:absolute;top:12px;right:12px;
  width:30px;height:30px;border-radius:50%;
  background:var(--bg4);border:1px solid var(--border);
  color:var(--text2);font-size:.85rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:all .13s;cursor:pointer;z-index:10;
}
.modal-close:hover{background:var(--purple);border-color:var(--purple);color:#fff}

/* Avatar area */
.modal-avatar-wrap{
  display:flex;justify-content:center;padding:28px 0 16px;
  position:relative;
}
.modal-avatar-ring{
  width:90px;height:90px;border-radius:50%;
  border:3px solid var(--purple);
  background:var(--bg4);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px var(--purple-glow);
  position:relative;
}
.modal-avatar-ring img{
  width:80px;height:80px;
  image-rendering:pixelated;
  object-fit:contain;
  display:block;
}

/* Text section */
.modal-text-section{
  padding:0 24px 20px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
}
.modal-ign{
  font-weight:900;font-style:italic;font-size:1.65rem;
  text-transform:uppercase;letter-spacing:.5px;
  color:#fff;word-break:break-word;line-height:1.1;
  margin-bottom:10px;
}

<script>
const TIER_POINTS = {
  "ht1": { ht: 60, lt: 60 },
  "lt1": { ht: 45, lt: 45 },
  "ht2": { ht: 30, lt: 30 },
  "lt2": { ht: 20, lt: 20 },
  "ht3": { ht: 10, lt: 10 },
  "lt3": { ht: 6,  lt: 6  },
  "ht4": { ht: 4,  lt: 4  },
  "lt4": { ht: 3,  lt: 3  },
  "ht5": { ht: 2,  lt: 2  },
  "lt5": { ht: 1,  lt: 1  },
};

const TIER_GROUPS = [
  { label:"Tier 1", trophy:"", color:"#f5c842", trophyColor:"#f5c842", ht:60, lt:45 },
  { label:"Tier 2", trophy:"", color:"#c0ccd8", trophyColor:"#c0ccd8", ht:30, lt:20 },
  { label:"Tier 3", trophy:"", color:"#cd7f3a", trophyColor:"#cd7f3a", ht:10, lt:6  },
  { label:"Tier 4", trophy:null, color:"#8b5cf6", trophyColor:"",        ht:4,  lt:3  },
  { label:"Tier 5", trophy:null, color:"#6d28d9", trophyColor:"",        ht:2,  lt:1  },
];

let players=[];
let currentMode="overall";

function tierCfg(name){
  const n=(name||"Untested").trim();
  return CONFIG.TIERS.find(t=>t.name.toLowerCase()===n.toLowerCase())||{name:n,color:"#3a4060",points:0};
}
function tierPoints(name){
  if(!name||name.trim()===""||name.trim().toLowerCase()==="untested") return 0;
  const key=name.trim().toLowerCase();
  if(TIER_POINTS[key]!==undefined) return TIER_POINTS[key].ht;
  const cfg=tierCfg(name);
  return +(cfg.points||cfg.ltPoints||0);
}
function playerPoints(p){
  return CONFIG.GAME_MODES.reduce((sum,m)=>{
    const val=(p[m.key+" New Tier"]||"").trim();
    return sum+tierPoints(val);
  },0);
}

const TITLES=[
  {min:400,label:"Combat Grandmaster",cls:"title-grandmaster"},
  {min:250,label:"Combat Master",cls:"title-master"},
  {min:100,label:"Combat Ace",cls:"title-ace"},
  {min:50, label:"Combat Specialist",cls:"title-specialist"},
  {min:20, label:"Combat Cadet",cls:"title-cadet"},
  {min:10, label:"Combat Novice",cls:"title-novice"},
  {min:0,  label:"Rookie",cls:"title-rookie"},
];
function getTitle(pts){return TITLES.find(t=>pts>=t.min)||TITLES[TITLES.length-1];}

function parseCSV(text){
  const lines=text.trim().split("\n");
  const headers=splitLine(lines[0]).map(h=>h.trim());
  return lines.slice(1).map(line=>{
    const vals=splitLine(line),obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});
    return obj;
  }).filter(r=>r.Player||r.IGN||r.DiscordID);
}
function splitLine(line){
  const res=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){q=!q;}else if(c===','&&!q){res.push(cur);cur="";}else{cur+=c;}
  }
  res.push(cur);return res;
}

async function init(){
  document.title=CONFIG.SITE_NAME||"Plus Tiers";
  const el=document.getElementById("discord-link");
  if(el) el.href="https://discord.gg/nnhU3qCtbp";
  buildModeTabs();
  buildInfoPanels();
  setupSearch();
  document.addEventListener("keydown",e=>{
    if(e.key==="Escape"){closeModal();closeInfoModal();}
    if(e.key==="/"&&document.activeElement!==document.getElementById("search-box")){
      e.preventDefault();document.getElementById("search-box").focus();
    }
  });
  try{
    const res=await fetch(CONFIG.SHEET_CSV_URL);
    if(!res.ok) throw new Error("HTTP "+res.status);
    players=parseCSV(await res.text());
  }catch(e){
    document.getElementById("loading-state").innerHTML=
      `<p style="color:#f55;font-family:'Orbitron',sans-serif;font-size:.75rem;text-align:center;letter-spacing:.05em">⚠ Failed to load data.<br><small>${e.message}</small></p>`;
    return;
  }
  showOverall();
}

// Keys that go into the "Other Gamemodes" dropdown
const OTHER_MODE_KEYS = ["Diamond Spear", "Ultra Diamond SMP", "Jumpfight"];

function buildModeTabs(){
  const bar=document.getElementById("mode-bar-inner");
  const right=bar.querySelector(".tab-bar-right");

  // Overall tab
  bar.insertBefore(makeTab("overall","🏆","Overall",null,()=>{selectMode("overall");showOverall();}),right);

  // Main game mode tabs (everything NOT in the dropdown list)
  const mainModes=CONFIG.GAME_MODES.filter(m=>!OTHER_MODE_KEYS.includes(m.key));
  mainModes.forEach(m=>{
    bar.insertBefore(makeTab(m.key,null,m.label,m.icon,()=>{selectMode(m.key);showTierMode(m.key);}),right);
  });

  // Dropdown modes
  const specialModes=CONFIG.GAME_MODES.filter(m=>OTHER_MODE_KEYS.includes(m.key));
  if(specialModes.length>0){
    const wrap=document.createElement("div");
    wrap.className="other-modes-wrap";

    const btn=document.createElement("div");
    btn.className="other-modes-btn";
    btn.id="other-modes-btn";
    btn.innerHTML=`
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
      </svg>
      Other Gamemodes
      <svg class="other-modes-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>`;

    const dropdown=document.createElement("div");
    dropdown.className="other-modes-dropdown";
    dropdown.id="other-modes-dropdown";

    const hdr=document.createElement("div");
    hdr.className="other-modes-dropdown-header";
    hdr.textContent="Select Gamemode";
    dropdown.appendChild(hdr);

    specialModes.forEach(m=>{
      const item=document.createElement("div");
      item.className="other-mode-item";
      item.dataset.mode=m.key;
      const iconHtml=m.icon?`<img src="${m.icon}" alt="${m.label}" onerror="this.style.display='none'">`:"";
      item.innerHTML=`${iconHtml}<span class="other-mode-item-label">${m.label}</span>`;
      item.addEventListener("click",()=>{
        closeOtherDropdown();
        selectMode(m.key);
        showTierMode(m.key);
        // Mark active item
        dropdown.querySelectorAll(".other-mode-item").forEach(i=>i.classList.remove("active"));
        item.classList.add("active");
        // Mark btn as active
        btn.classList.add("active");
      });
      dropdown.appendChild(item);
    });

    btn.addEventListener("click",(e)=>{
      e.stopPropagation();
      const isOpen=dropdown.classList.contains("open");
      if(isOpen){ closeOtherDropdown(); }
      else {
        // Position relative to mode-bar-wrap
        const wrapRect=document.querySelector(".mode-bar-wrap").getBoundingClientRect();
        const btnRect=btn.getBoundingClientRect();
        dropdown.style.position="absolute";
        dropdown.style.top=(btnRect.bottom-wrapRect.top)+"px";
        dropdown.style.right=(wrapRect.right-btnRect.right)+"px";
        dropdown.style.left="auto";
        dropdown.classList.add("open");
        btn.classList.add("open");
      }
    });

    wrap.appendChild(btn);
    // Append dropdown to mode-bar-wrap (not inner) so overflow:auto doesn't clip it
    bar.insertBefore(wrap,right);
    const modeBarWrap=document.querySelector(".mode-bar-wrap");
    if(modeBarWrap) modeBarWrap.appendChild(dropdown);
    else wrap.appendChild(dropdown);
  }
}

function closeOtherDropdown(){
  const dd=document.getElementById("other-modes-dropdown");
  const btn=document.getElementById("other-modes-btn");
  if(dd) dd.classList.remove("open");
  if(btn) btn.classList.remove("open");
}

// Close dropdown when clicking outside
document.addEventListener("click",(e)=>{
  const wrap=document.querySelector(".other-modes-wrap");
  const dd=document.getElementById("other-modes-dropdown");
  if(wrap&&!wrap.contains(e.target)&&dd&&!dd.contains(e.target)) closeOtherDropdown();
});

function makeTab(key,emoji,label,icon,onClick){
  const tab=document.createElement("div");
  tab.className="mode-tab";tab.dataset.mode=key;
  let iconHtml="";
  if(icon) iconHtml=`<img src="${icon}" alt="${label}" onerror="this.style.display='none'">`;
  else if(emoji) iconHtml=`<span class="tab-emoji">${emoji}</span>`;
  tab.innerHTML=`${iconHtml}${label}`;
  tab.addEventListener("click",onClick);
  return tab;
}

function selectMode(key){
  currentMode=key;
  document.querySelectorAll(".mode-tab").forEach(t=>t.classList.toggle("active",t.dataset.mode===key));
  // If switching to a main tab, clear the dropdown button's active state
  const isOther=OTHER_MODE_KEYS.includes(key);
  const btn=document.getElementById("other-modes-btn");
  const dd=document.getElementById("other-modes-dropdown");
  if(!isOther){
    if(btn) btn.classList.remove("active");
    if(dd) dd.querySelectorAll(".other-mode-item").forEach(i=>i.classList.remove("active"));
  }
}

function purpleName(text,rank){
  const gradients={
    1:'background:linear-gradient(90deg,#c4b5fd,#ede9fe,#a78bfa,#ede9fe,#c4b5fd);background-size:300% 100%;animation:nameShimmer 3s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-block',
    2:'background:linear-gradient(90deg,#9578f8,#c4b5fd,#a78bfa,#c4b5fd,#9578f8);background-size:300% 100%;animation:nameShimmer 3s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-block',
    3:'background:linear-gradient(90deg,#7c3aed,#a78bfa,#8b5cf6,#a78bfa,#7c3aed);background-size:300% 100%;animation:nameShimmer 3s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-block',
  };
  if(gradients[rank]) return `<span style="${gradients[rank]}">${esc(text)}</span>`;
  return `<span style="color:#fff">${esc(text)}</span>`;
}

function showOverall(){
  selectMode("overall");
  const list=[...players].map(p=>({...p,_pts:playerPoints(p)})).sort((a,b)=>b._pts-a._pts);
  document.getElementById("player-count").textContent=list.length+" players ranked";

  let html="";
  list.forEach((p,i)=>{
    const rank=i+1;
    const ign=(p.IGN||p.Player||"?").trim();
    const name=(p.Player||ign).trim();
    const reg=(p.Region||"").trim();
    const disc=(p.DiscordID||"").trim();
    const pts=p._pts;
    const ti=getTitle(pts);

    let rankCls="";
    if(rank===1) rankCls="rank-1";
    else if(rank===2) rankCls="rank-2";
    else if(rank===3) rankCls="rank-3";

    let nameSpan=purpleName(name,rank);

    const skin46=`https://mc-heads.net/avatar/${encodeURIComponent(ign)}/46`;
    const skin72=`https://mc-heads.net/avatar/${encodeURIComponent(ign)}/72`;

    /* FIX 2: Overall card tier badges — purple + show mode icon */
    const badges=CONFIG.GAME_MODES.map(m=>{
      const t=(p[m.key+" New Tier"]||"").trim();
      if(!t||t.toLowerCase()==="untested") return "";
      // Icon for this game mode
      const iconH=m.icon
        ?`<img src="${m.icon}" alt="${m.label}" onerror="this.style.display='none'">`
        :"";
      return `<span class="tier-badge-sm">${iconH}${esc(t)}</span>`;
    }).join("");

    html+=`<div class="player-card" onclick="openModal('${esc(disc)}')">

        <img class="head-float" src="${skin72}" alt="${esc(ign)}" onerror="this.style.display='none'">
      </div>
      <div class="card-info">
        <div class="card-ign">${nameSpan}</div>
        <div class="card-sub">
          <span class="card-title ${ti.cls}">${ti.label}</span>
          <span class="card-pts">${pts} pts</span>
          ${reg?`<span class="region-badge">${esc(reg)}</span>`:""}
        </div>
      </div>

    </div>`;
  });

}

/* ══════════════ TIER COLUMNS VIEW ══════════════ */
function tierNumber(name){
  const m=String(name).match(/(\d+)$/);
  return m?parseInt(m[1]):999;
}
function isHT(name){
  return /^ht/i.test(String(name).trim());
}

function showTierMode(modeKey){
  const mode=CONFIG.GAME_MODES.find(m=>m.key===modeKey);
  const colKey=modeKey+" New Tier";
  document.getElementById("player-count").textContent=players.length+" players";

  const groupMap={};
  players.forEach(p=>{
    const raw=(p[colKey]||"").trim();
    if(!raw||raw.toLowerCase()==="untested") return;
    const num=tierNumber(raw);
    if(!groupMap[num]) groupMap[num]={num,htMembers:[],ltMembers:[],htCfg:null,ltCfg:null};
    const tc=tierCfg(raw);
    if(isHT(raw)){
      groupMap[num].htCfg=tc;
      groupMap[num].htMembers.push(p);
    } else {
      groupMap[num].ltCfg=tc;
      groupMap[num].ltMembers.push(p);
    }
  });

  Object.values(groupMap).forEach(g=>{
    g.htMembers.sort((a,b)=>(a.Player||"").localeCompare(b.Player||""));
    g.ltMembers.sort((a,b)=>(a.Player||"").localeCompare(b.Player||""));
  });

  const sortedGroups=Object.values(groupMap).sort((a,b)=>a.num-b.num);
  const existingNums=new Set(sortedGroups.map(g=>g.num));
  TIER_GROUPS.forEach(tg=>{
    const num=parseInt(tg.label.replace(/\D/g,""));
    if(!existingNums.has(num)){
      sortedGroups.push({num,htMembers:[],ltMembers:[],htCfg:null,ltCfg:null});
    }
  });
  sortedGroups.sort((a,b)=>a.num-b.num);

  const trophyEmojis={1:"",2:"",3:""};

  let html=`<div class="section-header">
    <span class="section-title">${mode?mode.label:modeKey}</span>
    <span class="section-badge">Tier Rankings</span>
  </div>
  <div class="tier-columns">`;

  sortedGroups.forEach((g,idx)=>{
    const tg=TIER_GROUPS.find(x=>parseInt(x.label.replace(/\D/g,""))===g.num);
    const color=tg?tg.color:"#7a80a8";
    const trophy=trophyEmojis[g.num]?`<span class="tier-col-trophy">${trophyEmojis[g.num]}</span>`:"";
    const delay=(idx*0.05).toFixed(2);
    const allMembers=[...g.htMembers,...g.ltMembers];

    html+=`<div class="tier-col" style="animation-delay:${delay}s">
      <div class="tier-col-header" style="color:${color}">
        ${trophy}<span class="tier-col-name">Tier ${g.num}</span>
      </div><div class="tier-col-body">`;

    if(allMembers.length===0){
      html+=`<div class="tier-col-empty">No players</div>`;
    } else {
      const renderMembers=(members,label,badgeColor)=>{
        members.forEach(p=>{
          const ign=(p.IGN||p.Player||"?").trim();
          const name=(p.Player||ign).trim();
          const disc=(p.DiscordID||"").trim();
          const skin=`https://mc-heads.net/avatar/${encodeURIComponent(ign)}/28`;
          html+=`<div class="tier-player-row" data-disc="${esc(disc)}">
            <img src="${skin}" alt="${esc(ign)}" width="26" height="26"
              onerror="this.outerHTML='<div class=tier-player-fb>${name[0]?.toUpperCase()||"?"}</div>'">
            <span class="tier-player-name">${esc(name)}</span>
            <span class="tier-sub-badge" style="color:${badgeColor}">${label}</span>
          </div>`;
        });
      };
      if(g.htMembers.length) renderMembers(g.htMembers,"HT", color);
      if(g.ltMembers.length){
        if(g.htMembers.length) html+=`<div class="tier-ht-lt-divider"></div>`;
        renderMembers(g.ltMembers,"LT","var(--text3)");
      }
    }
    html+=`</div></div>`;
  });
  html+=`</div>`;

  document.getElementById("main-content").innerHTML=html;
  document.querySelectorAll(".tier-player-row").forEach(r=>{
    r.addEventListener("click",()=>openModal(r.dataset.disc));
  });
}

/* ══════════════ PLAYER MODAL ══════════════ */
function openModal(discordId){
  const p=players.find(x=>(x.DiscordID||"").trim()===discordId);
  if(!p) return;
  const ign=(p.IGN||p.Player||"?").trim();
  const name=(p.Player||ign).trim();
  const reg=(p.Region||"").trim();
  const pts=playerPoints(p);
  const ti=getTitle(pts);
  const sorted=[...players].sort((a,b)=>playerPoints(b)-playerPoints(a));
  const rank=sorted.findIndex(x=>(x.DiscordID||"").trim()===discordId)+1;

  let rankCls="";
  if(rank===1) rankCls="rank-1";
  else if(rank===2) rankCls="rank-2";
  else if(rank===3) rankCls="rank-3";

  /* FIX 3: Tier chips — purple colors + show game mode icon clearly */
  const tierChips=CONFIG.GAME_MODES.map(m=>{
    const t=(p[m.key+" New Tier"]||"").trim();
    const isTested=t&&t.toLowerCase()!=="untested";

    // Icon for this game mode
    const iconHtml=m.icon
      ?`<img src="${m.icon}" alt="${m.label}" onerror="this.style.display='none'">`
      :`<span style="font-size:.55rem;font-weight:900;color:var(--purple2);letter-spacing:.5px;text-transform:uppercase">${m.label[0]}</span>`;

    if(isTested){
      return `<div class="modal-tier-chip">
        <div class="modal-tier-icon-wrap has-tier">
          ${iconHtml}
        </div>
        <span class="modal-tier-val">${esc(t)}</span>
      </div>`;
    } else {
      return `<div class="modal-tier-chip modal-tier-empty">
        <div class="modal-tier-icon-wrap">
          <span class="modal-tier-dash">—</span>
        </div>
        <span class="modal-tier-val" style="color:var(--text3)">—</span>
      </div>`;
    }
  }).join("");

  document.getElementById("modal-body").innerHTML=`
    <div class="modal-avatar-wrap">
      <div class="modal-avatar-ring">
        <img
          src="https://mc-heads.net/avatar/${encodeURIComponent(ign)}/80"
          alt="${esc(name)}"
          onerror="this.src='https://crafatar.com/avatars/${encodeURIComponent(ign)}?size=80&overlay'"
        >
      </div>
    </div>

    <div class="modal-text-section">
      <div class="modal-ign">${esc(name)}</div>
      <div class="modal-title-pill">
        <div class="modal-title-pill-dot"></div>
        <span class="modal-title-text ${ti.cls}">${ti.label}</span>
      </div>
      ${reg?`<div class="modal-region-text">${esc(regionFull(reg))}</div>`:""}
      <a class="modal-namemc-btn" href="https://namemc.com/profile/${encodeURIComponent(ign)}" target="_blank" rel="noopener">
        <div class="modal-namemc-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </div>
        NameMC
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>

    <div class="modal-position-section">
      <div class="modal-position-label">Position</div>
      <div class="modal-position-row">
        <div class="modal-rank-num ${rankCls}">${rank}.</div>
        <div class="modal-position-overall">
          <span class="modal-trophy">🏆</span>
          <span class="modal-overall-label">Overall</span>
          <span class="modal-pts-text">(${pts} points)</span>
        </div>
      </div>
    </div>

    <div class="modal-tiers-section">
      <div class="modal-tiers-label">Tiers</div>
      <div class="modal-tiers-row">${tierChips}</div>
    </div>
  `;

  document.getElementById("player-modal").classList.remove("hidden");
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.getElementById("player-modal").classList.add("hidden");
  document.body.style.overflow="";
}

/* ══════════════ SEARCH ══════════════ */
function setupSearch(){
  const inp=document.getElementById("search-box");
  const res=document.getElementById("search-results");
  inp.addEventListener("input",()=>{
    const q=inp.value.trim().toLowerCase();
    res.innerHTML="";
    if(!q){res.classList.add("hidden");return;}
    const hits=players.filter(p=>
      (p.Player||"").toLowerCase().includes(q)||(p.IGN||"").toLowerCase().includes(q)
    ).slice(0,8);
    if(!hits.length){res.classList.add("hidden");return;}
    hits.forEach(p=>{
      const ign=(p.IGN||p.Player||"?").trim();
      const name=(p.Player||ign).trim();
      const reg=(p.Region||"").trim();
      const div=document.createElement("div");div.className="sr-item";
      div.innerHTML=`<img src="https://mc-heads.net/avatar/${encodeURIComponent(ign)}/32" alt="${esc(ign)}"
          onerror="this.outerHTML='<div class=sr-avatar>${name[0]?.toUpperCase()||"?"}</div>'">
        <div><div class="sr-name">${esc(name)}</div><div class="sr-sub">${esc(ign)}</div></div>
        <span class="sr-region">${esc(reg)}</span>`;
      div.addEventListener("click",()=>{res.classList.add("hidden");inp.value="";openModal((p.DiscordID||"").trim());});
      res.appendChild(div);
    });
    res.classList.remove("hidden");
  });
  document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap")) res.classList.add("hidden");});
  inp.addEventListener("keydown",e=>{if(e.key==="Escape"){res.classList.add("hidden");inp.value="";}});
}

function regionFull(r){return{NA:"North America",EU:"Europe",AS:"Asia",SA:"South America",OC:"Oceania",AF:"Africa"}[r]||r;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

document.addEventListener("DOMContentLoaded",init);
